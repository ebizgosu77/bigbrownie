<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멘토링 체크일지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f3ef; --surface:#fff; --surface2:#f9f8f5;
    --border:#e4e2db; --border2:#d0cec6;
    --text:#1a1916; --text2:#5a5850; --text3:#9a9890;
    --accent:#2a5c45; --accent-light:#e8f2ed;
    --accent2:#c8773a; --accent2-light:#fdf0e6;
    --danger:#c0392b; --danger-light:#fdf0ef;
    --warn:#b5730a; --warn-light:#fef6e4;
    --blue:#1a56a0; --blue-light:#e8f0fe;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
    --shadow-lg:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

  /* LOADING */
  #loadingOverlay{position:fixed;inset:0;background:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;transition:opacity .4s;}
  #loadingOverlay.hidden{opacity:0;pointer-events:none;}
  .ld-dots{display:flex;gap:8px;}
  .ld-dot{width:10px;height:10px;border-radius:50%;background:var(--accent2);animation:ldot 1.2s ease-in-out infinite;}
  .ld-dot:nth-child(2){animation-delay:.2s;} .ld-dot:nth-child(3){animation-delay:.4s;}
  @keyframes ldot{0%,80%,100%{transform:scale(0);opacity:.3;}40%{transform:scale(1);opacity:1;}}
  .ld-text{font-size:13px;color:#9a9890;letter-spacing:.05em;}

  /* SYNC */
  .sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;}
  .sync-badge.synced{background:#1e3a2f;color:#6fcf97;}
  .sync-badge.syncing{background:#3a3020;color:#f2994a;}
  .sync-badge.error{background:#3a1f1f;color:#eb5757;}
  .sync-dot{width:6px;height:6px;border-radius:50%;}
  .synced .sync-dot{background:#6fcf97;} .syncing .sync-dot{background:#f2994a;animation:pulse 1s infinite;} .error .sync-dot{background:#eb5757;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* HEADER */
  header{background:var(--text);color:#f4f3ef;padding:0 24px;height:54px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;}
  .hd-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:9px;white-space:nowrap;}
  .hd-dot{width:7px;height:7px;background:var(--accent2);border-radius:50%;}
  .hd-legend{display:flex;align-items:center;gap:10px;flex:1;}
  .lg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#b0ada6;white-space:nowrap;}
  .lg-dot{width:7px;height:7px;border-radius:2px;}
  .lg-dot.done{background:#2a5c45;} .lg-dot.missing{background:#c0392b;} .lg-dot.pend{background:#888;}
  .hd-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
  .hd-date{font-size:11px;color:#888;font-family:'DM Mono',monospace;white-space:nowrap;}

  /* COHORT TAB BAR */
  .cohort-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:0;overflow-x:auto;min-height:44px;}
  .cohort-bar::-webkit-scrollbar{height:3px;}
  .cohort-bar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
  .cohort-tab{display:flex;align-items:center;gap:6px;padding:0 18px;height:44px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;position:relative;}
  .cohort-tab:hover{color:var(--text2);background:var(--surface2);}
  .cohort-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
  .cohort-tab-name{outline:none;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:inherit;color:inherit;cursor:pointer;min-width:20px;max-width:100px;}
  .cohort-tab.active .cohort-tab-name{cursor:text;color:var(--accent);}
  .cohort-del{width:16px;height:16px;border-radius:50%;background:transparent;border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;opacity:0;transition:all .15s;}
  .cohort-tab:hover .cohort-del{opacity:1;}
  .cohort-del:hover{background:var(--danger-light);color:var(--danger);}
  .add-cohort-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;margin-left:8px;border:1px dashed var(--border2);border-radius:6px;background:transparent;color:var(--text3);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
  .add-cohort-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

  /* LAYOUT */
  .app{display:flex;flex:1;height:calc(100vh - 98px);}

  /* SIDEBAR */
  .sidebar{width:228px;min-width:228px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
  .sb-head{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .sb-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}
  .sb-sub{font-size:11px;color:var(--text2);}
  .mentor-list{padding:8px 0;flex:1;}
  .m-item{padding:10px 18px;cursor:pointer;transition:background .15s;border-left:3px solid transparent;position:relative;}
  .m-item:hover{background:var(--surface2);}
  .m-item.active{background:var(--accent-light);border-left-color:var(--accent);}
  .m-name-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
  .m-name{font-size:14px;font-weight:600;background:transparent;border:none;outline:none;font-family:'Noto Sans KR',sans-serif;color:var(--text);cursor:pointer;padding:0;min-width:60px;width:100%;}
  .m-item.active .m-name{color:var(--accent);}
  .m-name:focus{border-bottom:1px solid var(--accent);cursor:text;}
  .m-edit-icon{font-size:11px;color:var(--text3);opacity:0;transition:opacity .15s;flex-shrink:0;}
  .m-item:hover .m-edit-icon{opacity:1;}
  .m-item.active .m-edit-icon{color:var(--accent);opacity:.6;}
  .m-time-row{font-size:11px;font-family:'DM Mono',monospace;color:var(--blue);font-weight:600;margin-bottom:4px;}
  .m-pills{display:flex;gap:4px;flex-wrap:wrap;}
  .pill{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px;font-weight:500;}
  .pill.done{background:var(--accent-light);color:var(--accent);}
  .pill.missing{background:var(--danger-light);color:var(--danger);}
  .pill.warn{background:var(--warn-light);color:var(--warn);}
  .pill.pend{background:var(--border);color:var(--text3);}
  .sb-foot{padding:14px 18px;border-top:1px solid var(--border);}
  .sb-sum{font-size:12px;color:var(--text2);line-height:1.9;}

  /* MAIN */
  .main{flex:1;overflow-y:auto;padding:26px 30px;display:flex;flex-direction:column;gap:20px;}

  .mh-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:var(--shadow);}
  .mh-info h2{font-size:20px;font-weight:700;margin-bottom:3px;}
  .mh-info p{font-size:12px;color:var(--text2);}
  .mh-stats{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .stat{text-align:center;padding:8px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;min-width:62px;}
  .stat.time-stat{border-color:var(--blue);background:var(--blue-light);}
  .stat-n{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;}
  .stat-n.g{color:var(--accent);} .stat-n.r{color:var(--danger);} .stat-n.w{color:var(--warn);} .stat-n.gr{color:var(--text3);} .stat-n.b{color:var(--blue);}
  .stat-l{font-size:10px;color:var(--text3);margin-top:1px;}
  .time-stat .stat-l{color:var(--blue);}

  .section-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  .phases-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .phase-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  .phase-card.status-overdue-incomplete{border-color:#f5c6c6;}
  .phase-card.status-warning{border-color:#fde8b0;}
  .phase-card.status-done{border-color:#b8dcc8;}
  .pc-head{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
  .phase-card.status-overdue-incomplete .pc-head{background:#fff8f8;border-bottom-color:#f5c6c6;}
  .phase-card.status-warning .pc-head{background:#fffbf2;border-bottom-color:#fde8b0;}
  .phase-card.status-done .pc-head{background:#f4faf7;border-bottom-color:#b8dcc8;}
  .pc-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .pi-0{background:#e8f0fe;} .pi-1{background:#e8f5e9;} .pi-2{background:#fff3e0;} .pi-3{background:#fce4ec;}
  .pc-title{flex:1;} .pc-title .phase-name{font-size:13px;font-weight:600;margin-bottom:1px;} .pc-title .phase-sub{font-size:11px;color:var(--text3);}
  .dday{font-size:11px;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap;}
  .dday.over-complete,.dday.done-badge{background:var(--accent-light);color:var(--accent);}
  .dday.over-incomplete{background:var(--danger-light);color:var(--danger);}
  .dday.today{background:#ffe4cc;color:#9c4a00;}
  .dday.soon{background:var(--warn-light);color:var(--warn);}
  .dday.ok,.dday.no-date{background:var(--border);color:var(--text3);}
  .pc-body{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
  .deadline-row{display:flex;align-items:center;gap:8px;}
  .deadline-row label{font-size:11px;color:var(--text3);white-space:nowrap;}
  .deadline-input{border:1px solid var(--border2);border-radius:6px;padding:5px 9px;font-size:12px;font-family:'DM Mono',monospace;color:var(--text);background:var(--surface);cursor:pointer;flex:1;}
  .deadline-input:focus{outline:none;border-color:var(--accent);}
  .output-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .output-label{font-size:12px;font-weight:500;color:var(--text2);}

  .tri{display:inline-flex;border:1px solid var(--border2);border-radius:7px;overflow:hidden;}
  .tri-b{padding:5px 10px;cursor:pointer;border:none;background:var(--surface);color:var(--text3);font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;transition:all .15s;border-right:1px solid var(--border2);white-space:nowrap;line-height:1;}
  .tri-b:last-child{border-right:none;}
  .tri-b:hover:not(.a-done):not(.a-miss):not(.a-pend){background:var(--surface2);}
  .tri-b.a-done{background:var(--accent);color:#fff;font-weight:700;}
  .tri-b.a-miss{background:var(--danger);color:#fff;font-weight:700;}
  .tri-b.a-pend{background:#e0dfd9;color:var(--text2);font-weight:700;}

  .add-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 2px 6px rgba(42,92,69,.25);white-space:nowrap;}
  .add-btn:hover{background:#1e4433;transform:translateY(-1px);}

  .sessions-wrap{display:flex;flex-direction:column;gap:14px;}
  .empty-box{text-align:center;padding:48px 20px;color:var(--text3);background:var(--surface);border:2px dashed var(--border);border-radius:12px;}
  .empty-box p{font-size:14px;margin-top:10px;}

  .ses-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  .ses-card.has-miss{border-color:#f5c6c6;}
  .ses-head{display:flex;align-items:center;padding:12px 18px;background:var(--surface2);border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;}
  .ses-card.has-miss .ses-head{background:#fff8f8;border-bottom-color:#f5c6c6;}
  .ses-num{font-size:10px;font-weight:700;letter-spacing:.1em;color:#fff;background:var(--accent);padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap;}
  .ses-meta{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap;}
  .ses-field{display:flex;align-items:center;gap:6px;}
  .ses-field-l{font-size:11px;color:var(--text3);white-space:nowrap;}
  .ses-date{border:1px solid var(--border2);border-radius:6px;padding:5px 9px;font-size:12px;font-family:'DM Mono',monospace;color:var(--text);background:var(--surface);cursor:pointer;}
  .ses-date:focus{outline:none;border-color:var(--accent);}
  .time-input-wrap{display:flex;align-items:center;gap:4px;}
  .time-num{width:46px;border:1px solid var(--border2);border-radius:6px;padding:5px 6px;font-size:12px;font-family:'DM Mono',monospace;color:var(--text);background:var(--surface);text-align:center;}
  .time-num:focus{outline:none;border-color:var(--blue);}
  .time-unit{font-size:11px;color:var(--text3);}
  .time-total-badge{font-size:11px;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:20px;background:var(--blue-light);color:var(--blue);font-weight:600;white-space:nowrap;}
  .ses-head-r{display:flex;align-items:center;gap:8px;}
  .ses-badge{font-size:11px;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap;}
  .sb-all{background:var(--accent-light);color:var(--accent);}
  .sb-miss{background:var(--danger-light);color:var(--danger);}
  .sb-part{background:var(--accent2-light);color:var(--accent2);}
  .sb-empty{background:var(--border);color:var(--text3);}
  .del-btn{width:26px;height:26px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:13px;flex-shrink:0;}
  .del-btn:hover{background:#fef0f0;border-color:#f5c6c6;color:var(--danger);}

  .ses-table{width:100%;border-collapse:collapse;}
  .ses-table thead tr{border-bottom:1px solid var(--border);}
  .ses-table th{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);padding:9px 18px;text-align:left;}
  .ses-table th.check-th{text-align:center;}
  .ses-table tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
  .ses-table tbody tr:last-child{border-bottom:none;}
  .ses-table tbody tr:hover{background:var(--surface2);}
  .cat-cell{padding:12px 18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;}
  .cat-ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
  .r0 .cat-ic{background:#e8f0fe;} .r1 .cat-ic{background:#e8f5e9;} .r2 .cat-ic{background:#fff3e0;} .r3 .cat-ic{background:#fce4ec;}
  td.check-td{text-align:center;padding:10px 14px;}
  .dl-chip{font-size:10px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap;margin-left:6px;}
  .dl-chip.over{background:var(--danger-light);color:var(--danger);}
  .dl-chip.soon{background:var(--warn-light);color:var(--warn);}
  .dl-chip.ok{background:var(--accent-light);color:var(--accent);}
  .miss-row{padding:8px 18px;background:#fff2f2;border-top:1px solid #f5c6c6;font-size:12px;color:var(--danger);display:flex;align-items:flex-start;gap:6px;line-height:1.7;flex-wrap:wrap;}
  .time-summary-bar{padding:9px 18px;background:var(--blue-light);border-top:1px solid #c5d9f5;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--blue);font-weight:500;}
  .time-summary-bar strong{font-family:'DM Mono',monospace;}
  .notes-wrap{padding:10px 18px;background:var(--surface2);border-top:1px solid var(--border);}
  .notes-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
  .notes-ta{width:100%;border:1px solid var(--border2);border-radius:7px;padding:8px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--surface);resize:vertical;min-height:38px;}
  .notes-ta:focus{outline:none;border-color:var(--accent);}
  .notes-ta::placeholder{color:var(--text3);}

  /* MODAL */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
  .modal-backdrop.show{opacity:1;pointer-events:auto;}
  .modal{background:var(--surface);border-radius:14px;padding:28px;width:360px;box-shadow:var(--shadow-lg);transform:translateY(8px);transition:transform .2s;}
  .modal-backdrop.show .modal{transform:translateY(0);}
  .modal h3{font-size:16px;font-weight:700;margin-bottom:6px;}
  .modal p{font-size:13px;color:var(--text2);margin-bottom:18px;}
  .modal-input{width:100%;border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--text);margin-bottom:16px;}
  .modal-input:focus{outline:none;border-color:var(--accent);}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;}
  .modal-cancel{padding:8px 16px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
  .modal-cancel:hover{background:var(--surface2);}
  .modal-confirm{padding:8px 16px;border:none;border-radius:7px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
  .modal-confirm:hover{background:#1e4433;}

  /* EMPTY COHORT */
  .no-cohort{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;color:var(--text3);}
  .no-cohort p{font-size:14px;}

  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
  .toast{position:fixed;bottom:26px;right:26px;background:var(--text);color:#f4f3ef;padding:11px 18px;border-radius:8px;font-size:13px;box-shadow:var(--shadow-lg);transform:translateY(8px);opacity:0;transition:all .2s;z-index:999;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  @media(max-width:900px){.phases-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div>
  <div class="ld-text">Firebase에 연결 중...</div>
</div>

<header>
  <div class="hd-title"><span class="hd-dot"></span>멘토링 체크일지</div>
  <div class="hd-legend">
    <div class="lg-item"><span class="lg-dot done"></span>완료</div>
    <div class="lg-item"><span class="lg-dot missing"></span>미기입</div>
    <div class="lg-item"><span class="lg-dot pend"></span>미확인</div>
  </div>
  <div class="hd-right">
    <div class="sync-badge syncing" id="syncBadge"><div class="sync-dot"></div><span id="syncText">연결 중</span></div>
    <div class="hd-date" id="hDate"></div>
  </div>
</header>

<!-- 기수 탭바 -->
<div class="cohort-bar" id="cohortBar">
  <button class="add-cohort-btn" id="addCohortBtn">＋ 기수 추가</button>
</div>

<div class="app" id="appLayout">
  <div class="no-cohort" id="noCohort">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="8" y="8" width="32" height="32" rx="4" stroke="#d0cec6" stroke-width="2"/><path d="M24 18v12M18 24h12" stroke="#d0cec6" stroke-width="2" stroke-linecap="round"/></svg>
    <p>상단의 <strong>＋ 기수 추가</strong>를 눌러 시작하세요.</p>
  </div>
  <aside class="sidebar" id="sidebar" style="display:none;">
    <div class="sb-head">
      <div>
        <div class="sb-label">멘토 목록</div>
        <div class="sb-sub" id="sbSub"></div>
      </div>
    </div>
    <div class="mentor-list" id="mentorList"></div>
    <div class="sb-foot"><div class="sb-sum" id="sbSum"></div></div>
  </aside>
  <main class="main" id="mainContent" style="display:none;"></main>
</div>

<!-- 기수 추가 모달 -->
<div class="modal-backdrop" id="cohortModal">
  <div class="modal">
    <h3>새 기수 추가</h3>
    <p>기수 이름과 멘토님 5분의 이름을 입력해주세요.</p>
    <input class="modal-input" id="cohortNameInput" placeholder="예: 1기, 2기, SK 3기" maxlength="20">
    <div id="mentorInputs"></div>
    <div class="modal-actions">
      <button class="modal-cancel" id="cohortModalCancel">취소</button>
      <button class="modal-confirm" id="cohortModalConfirm">추가</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove, push }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDF0OFdUG2bZ1QDi1hNvOGZgdrXcng0NIQ",
  authDomain: "mentoring-check.firebaseapp.com",
  databaseURL: "https://mentoring-check-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mentoring-check",
  storageBucket: "mentoring-check.firebasestorage.app",
  messagingSenderId: "97354960863",
  appId: "1:97354960863:web:2135b13a64cd4f26b1be6a",
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

/* ── 상수 ── */
const PHASES = [
  { name:'프로젝트 기획평가', icon:'📋', icCls:'pi-0' },
  { name:'백엔드 평가',       icon:'⚙️',  icCls:'pi-1' },
  { name:'프론트엔드 평가',   icon:'🖥️', icCls:'pi-2' },
  { name:'시스템 통합평가',   icon:'🔗', icCls:'pi-3' },
];
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const DEFAULT_MENTORS = ['홍건의','양지현','석지민','양재연','이용준'];

/* ── 상태 ── */
let state = {};          // { [cohortKey]: { name, mentors:{0..4}, mentoring:{...} } }
let activeCohort = null; // cohortKey
let activeMentor = 0;
let _init = false;

/* ── Firebase 구독 ── */
function syncBadge(s){
  const b=document.getElementById('syncBadge'), t=document.getElementById('syncText');
  b.className='sync-badge '+s;
  t.textContent=s==='synced'?'실시간 동기화':s==='syncing'?'동기화 중':'연결 오류';
}

onValue(ref(db,'cohorts'), snap=>{
  state = snap.val()||{};
  syncBadge('synced');
  if(!_init){
    _init=true;
    const ov=document.getElementById('loadingOverlay');
    ov.classList.add('hidden');
    setTimeout(()=>ov.remove(),500);
    // 기존 1기 데이터가 없으면 자동 생성
    const keys=Object.keys(state);
    if(keys.length===0){
      createCohort('1기', DEFAULT_MENTORS);
      return;
    }
    if(!activeCohort || !state[activeCohort]) activeCohort=keys[0];
  } else {
    const keys=Object.keys(state);
    if(activeCohort && !state[activeCohort]) activeCohort=keys[0]||null;
  }
  render();
}, err=>{ console.error(err); syncBadge('error'); });

/* ── DB 헬퍼 ── */
function dbSet(path,val){ syncBadge('syncing'); return set(ref(db,path),val); }
function dbRemove(path){ syncBadge('syncing'); return remove(ref(db,path)); }

/* ── 기수 생성 ── */
function createCohort(name, mentorNames){
  const newRef = push(ref(db,'cohorts'));
  const mentors = {};
  mentorNames.forEach((n,i)=>{ mentors[i]={name:n}; });
  set(newRef,{ name, mentors, mentoring:{} });
  activeCohort = newRef.key;
  activeMentor = 0;
}

/* ── 데이터 접근 ── */
function getCohort(ck){ return state[ck]||{}; }
function getMentors(ck){
  const m=getCohort(ck).mentors||{};
  return Array.from({length:5},(_,i)=>m[i]?.name||`멘토${i+1}`);
}
function getMentoring(ck){ return getCohort(ck).mentoring||{}; }
function getMentorData(ck,mi){
  const d=getMentoring(ck)[mi];
  return d||{deadlines:{},output:{},sessions:{}};
}
function getSessions(ck,mi){
  const s=getMentorData(ck,mi).sessions||{};
  return Object.entries(s).sort(([a],[b])=>a>b?1:a<b?-1:0).map(([k,v])=>({...v,_key:k}));
}

/* ── 시간 ── */
function sesMins(ses){ return (parseInt(ses.duration?.h)||0)*60+(parseInt(ses.duration?.m)||0); }
function totalMins(ck,mi){ return getSessions(ck,mi).reduce((s,ses)=>s+sesMins(ses),0); }
function fmtMins(m){ if(!m) return '0분'; const h=Math.floor(m/60),r=m%60; return h&&r?`${h}시간 ${r}분`:h?`${h}시간`:`${r}분`; }

/* ── D-Day ── */
function parseDL(s){ if(!s) return null; const d=new Date(s); d.setHours(0,0,0,0); return d; }
function getDday(dlStr,isDone){
  const dl=parseDL(dlStr);
  if(!dl) return {text:'마감일 미설정',cls:'no-date',cardCls:''};
  const diff=Math.round((dl-TODAY)/86400000);
  if(isDone) return {text:'✓ 완료',cls:'done-badge',cardCls:'status-done'};
  if(diff<0)  return {text:`D+${Math.abs(diff)} 초과`,cls:'over-incomplete',cardCls:'status-overdue-incomplete'};
  if(diff===0) return {text:'D-Day',cls:'today',cardCls:'status-warning'};
  if(diff<=7)  return {text:`D-${diff}`,cls:'soon',cardCls:'status-warning'};
  return {text:`D-${diff}`,cls:'ok',cardCls:''};
}
function getChip(dlStr,isDone){
  const dl=parseDL(dlStr); if(!dl||isDone) return null;
  const diff=Math.round((dl-TODAY)/86400000);
  if(diff<0) return {text:`D+${Math.abs(diff)}초과`,cls:'over'};
  if(diff<=7) return {text:`D-${diff}`,cls:'soon'};
  return {text:`D-${diff}`,cls:'ok'};
}
function fmtDate(s){ if(!s) return ''; const d=new Date(s); return `${d.getMonth()+1}/${d.getDate()}`; }

/* ── 통계 ── */
function calcStats(ck,mi){
  const d=getMentorData(ck,mi), sessions=getSessions(ck,mi);
  let oDone=0,oMiss=0,overdue=0;
  PHASES.forEach((_,pi)=>{
    const v=d.output?.[pi]; const isDone=v==='done';
    if(isDone) oDone++; else if(v==='missing') oMiss++;
    const dl=parseDL(d.deadlines?.[pi]);
    if(dl&&dl<TODAY&&!isDone) overdue++;
  });
  let sDone=0,sMiss=0;
  sessions.forEach(s=>PHASES.forEach((_,pi)=>{
    const v=s.checks?.[pi]; if(v==='done') sDone++; else if(v==='missing') sMiss++;
  }));
  return {oDone,oMiss,sDone,sMiss,overdue,totMins:totalMins(ck,mi),sessions:sessions.length};
}

/* ── Toast ── */
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

/* ── 기수 탭바 ── */
function renderCohortBar(){
  const bar=document.getElementById('cohortBar');
  const addBtn=document.getElementById('addCohortBtn');
  // 기존 탭 제거
  bar.querySelectorAll('.cohort-tab').forEach(t=>t.remove());

  const cohortKeys=Object.keys(state).sort();
  cohortKeys.forEach(ck=>{
    const c=getCohort(ck);
    const tab=document.createElement('div');
    tab.className='cohort-tab'+(ck===activeCohort?' active':'');
    tab.dataset.ck=ck;

    const nameEl=document.createElement('input');
    nameEl.className='cohort-tab-name';
    nameEl.value=c.name||'기수';
    nameEl.title='클릭하여 이름 수정';
    // 비활성 탭은 클릭 시 탭 선택
    nameEl.addEventListener('click',e=>{
      if(ck!==activeCohort){ e.preventDefault(); activeCohort=ck; activeMentor=0; render(); }
    });
    nameEl.addEventListener('change',()=>{
      dbSet(`cohorts/${ck}/name`, nameEl.value||'기수');
    });
    nameEl.addEventListener('keydown',e=>{ if(e.key==='Enter') nameEl.blur(); });

    const delBtn=document.createElement('button');
    delBtn.className='cohort-del'; delBtn.textContent='✕'; delBtn.title='기수 삭제';
    delBtn.addEventListener('click',e=>{
      e.stopPropagation();
      if(confirm(`"${c.name||'기수'}"를 삭제할까요?\n모든 데이터가 삭제됩니다.`)){
        dbRemove(`cohorts/${ck}`);
        if(activeCohort===ck){
          const remaining=Object.keys(state).filter(k=>k!==ck);
          activeCohort=remaining[0]||null;
        }
      }
    });

    tab.appendChild(nameEl); tab.appendChild(delBtn);
    bar.insertBefore(tab, addBtn);
  });
}

/* ── 사이드바 ── */
function renderSidebar(){
  if(!activeCohort){ document.getElementById('sidebar').style.display='none'; document.getElementById('noCohort').style.display='flex'; document.getElementById('mainContent').style.display='none'; return; }
  document.getElementById('sidebar').style.display='flex';
  document.getElementById('noCohort').style.display='none';
  document.getElementById('mainContent').style.display='flex';

  const mentors=getMentors(activeCohort);
  document.getElementById('sbSub').textContent=`${mentors.length}명`;

  const list=document.getElementById('mentorList');
  list.innerHTML='';
  let tDone=0,tMiss=0,tOver=0,tSes=0,tMins=0;

  mentors.forEach((name,i)=>{
    const st=calcStats(activeCohort,i);
    tDone+=st.oDone+st.sDone; tMiss+=st.oMiss+st.sMiss;
    tOver+=st.overdue; tSes+=st.sessions; tMins+=st.totMins;

    const el=document.createElement('div');
    el.className='m-item'+(i===activeMentor?' active':'');

    const allEmpty=!st.sessions&&!st.oDone&&!st.oMiss&&!st.overdue;
    const pills=allEmpty?`<span class="pill pend">미시작</span>`:[
      (st.sDone+st.oDone)>0?`<span class="pill done">완료 ${st.sDone+st.oDone}</span>`:'',
      (st.sMiss+st.oMiss)>0?`<span class="pill missing">미기입 ${st.sMiss+st.oMiss}</span>`:'',
      st.overdue>0?`<span class="pill warn">마감초과 ${st.overdue}</span>`:'',
    ].join('');

    el.innerHTML=`
      <div class="m-name-row">
        <input class="m-name" value="${name}" title="클릭하여 이름 수정" data-mi="${i}">
        <span class="m-edit-icon">✎</span>
      </div>
      ${st.totMins>0?`<div class="m-time-row">⏱ 누적 ${fmtMins(st.totMins)}</div>`:''}
      <div class="m-pills">${pills}</div>
    `;

    // 이름 수정
    const nameInput=el.querySelector('.m-name');
    nameInput.addEventListener('click',()=>{ activeMentor=i; render(); });
    nameInput.addEventListener('focus',()=>{ activeMentor=i; render(); });
    nameInput.addEventListener('change',()=>{
      dbSet(`cohorts/${activeCohort}/mentors/${i}/name`, nameInput.value||`멘토${i+1}`);
    });
    nameInput.addEventListener('keydown',e=>{ if(e.key==='Enter') nameInput.blur(); });

    el.addEventListener('click',e=>{ if(e.target!==nameInput){ activeMentor=i; render(); } });
    list.appendChild(el);
  });

  document.getElementById('sbSum').innerHTML=
    `전체 세션: <strong>${tSes}회</strong><br>`+
    `완료: <strong style="color:var(--accent)">${tDone}</strong> &nbsp;·&nbsp; `+
    `미기입: <strong style="color:var(--danger)">${tMiss}</strong><br>`+
    `전체 누적시간: <strong style="color:var(--blue)">${fmtMins(tMins)}</strong>`+
    (tOver>0?`<br>⚠️ 마감초과: <strong style="color:var(--warn)">${tOver}건</strong>`:'');
}

/* ── MAIN ── */
function renderMain(){
  if(!activeCohort) return;
  const main=document.getElementById('mainContent');
  const mentors=getMentors(activeCohort);
  const name=mentors[activeMentor];
  const st=calcStats(activeCohort,activeMentor);
  main.innerHTML=`
    <div class="mh-card">
      <div class="mh-info">
        <h2>${name} 멘토 — <span style="color:var(--text3);font-size:16px;">${getCohort(activeCohort).name||''}</span></h2>
        <p>회차별 수행일지 · 단계별 산출물평가서 · 마감일 · 멘토링 시간</p>
      </div>
      <div class="mh-stats">
        <div class="stat time-stat"><div class="stat-n b" style="font-size:15px;">${fmtMins(st.totMins)}</div><div class="stat-l">누적 멘토링</div></div>
        <div class="stat"><div class="stat-n gr">${st.sessions}</div><div class="stat-l">회차</div></div>
        <div class="stat"><div class="stat-n g">${st.sDone}</div><div class="stat-l">수행일지 완료</div></div>
        <div class="stat"><div class="stat-n r">${st.sMiss}</div><div class="stat-l">수행일지 미기입</div></div>
        <div class="stat"><div class="stat-n g">${st.oDone}</div><div class="stat-l">산출물 완료</div></div>
        <div class="stat"><div class="stat-n r">${st.oMiss}</div><div class="stat-l">산출물 미기입</div></div>
        ${st.overdue>0?`<div class="stat"><div class="stat-n w">${st.overdue}</div><div class="stat-l">마감초과</div></div>`:''}
      </div>
    </div>
    <div class="section-label">📁 산출물평가서 &amp; 마감일</div>
    <div class="phases-grid" id="phasesGrid"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <div class="section-label" style="flex:1;">📝 수행일지 — 회차별</div>
      <button class="add-btn" id="addBtn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>회차 추가
      </button>
    </div>
    <div class="sessions-wrap" id="sesWrap"></div>
  `;
  document.getElementById('addBtn').onclick=addSession;
  renderPhasesGrid(); renderSessions();
}

/* ── PHASES ── */
function renderPhasesGrid(){
  const grid=document.getElementById('phasesGrid'); if(!grid) return;
  const d=getMentorData(activeCohort,activeMentor);
  grid.innerHTML=PHASES.map((ph,pi)=>{
    const v=d.output?.[pi]||null, dl=d.deadlines?.[pi]||'';
    const dday=getDday(dl,v==='done');
    return `
      <div class="phase-card ${dday.cardCls}">
        <div class="pc-head">
          <div class="pc-icon ${ph.icCls}">${ph.icon}</div>
          <div class="pc-title"><div class="phase-name">${ph.name}</div><div class="phase-sub">단계 완료 시 1회 제출</div></div>
          <span class="dday ${dday.cls}">${dday.text}</span>
        </div>
        <div class="pc-body">
          <div class="deadline-row">
            <label>📅 마감일</label>
            <input type="date" class="deadline-input" value="${dl}" data-pi="${pi}">
          </div>
          <div class="output-row">
            <span class="output-label">산출물평가서</span>
            <div class="tri">
              <button class="tri-b${v==='done'?' a-done':''}" data-type="out" data-pi="${pi}" data-v="done">✓ 완료</button>
              <button class="tri-b${v==='missing'?' a-miss':''}" data-type="out" data-pi="${pi}" data-v="missing">✕ 미기입</button>
              <button class="tri-b${v===null?' a-pend':''}" data-type="out" data-pi="${pi}" data-v="null">— 미확인</button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
  grid.querySelectorAll('.deadline-input').forEach(inp=>{
    inp.addEventListener('change',()=>dbSet(`cohorts/${activeCohort}/mentoring/${activeMentor}/deadlines/${inp.dataset.pi}`,inp.value));
  });
  grid.querySelectorAll('.tri-b[data-type="out"]').forEach(btn=>{
    btn.addEventListener('click',function(){
      const val=this.dataset.v==='null'?null:this.dataset.v;
      dbSet(`cohorts/${activeCohort}/mentoring/${activeMentor}/output/${this.dataset.pi}`,val);
      showToast(val==='missing'?'⚠️ 산출물평가서 미기입 표시':val==='done'?'✓ 산출물평가서 완료':'— 미확인');
    });
  });
}

/* ── SESSIONS ── */
function getSesBadge(ses){
  let done=0,miss=0,total=PHASES.length;
  PHASES.forEach((_,pi)=>{ const v=ses.checks?.[pi]; if(v==='done') done++; else if(v==='missing') miss++; });
  const pend=total-done-miss;
  if(done===total) return {cls:'sb-all',label:'전체완료',hasMiss:false};
  if(miss>0&&pend===0&&done===0) return {cls:'sb-miss',label:`미기입 ${miss}건`,hasMiss:true};
  if(miss>0) return {cls:'sb-miss',label:`미기입 ${miss}건`,hasMiss:true};
  if(done>0) return {cls:'sb-part',label:`${done}/${total} 완료`,hasMiss:false};
  return {cls:'sb-empty',label:'미확인',hasMiss:false};
}

function renderSessions(){
  const wrap=document.getElementById('sesWrap'); if(!wrap) return;
  const d=getMentorData(activeCohort,activeMentor);
  const sessions=getSessions(activeCohort,activeMentor);
  wrap.innerHTML='';
  if(!sessions.length){
    wrap.innerHTML=`<div class="empty-box"><svg width="38" height="38" viewBox="0 0 38 38" fill="none"><rect x="7" y="5" width="24" height="28" rx="3" stroke="#9a9890" stroke-width="1.4"/><path d="M13 13h12M13 19h8M13 25h5" stroke="#9a9890" stroke-width="1.4" stroke-linecap="round"/></svg><p>아직 회차가 없습니다.<br><strong>회차 추가</strong> 버튼을 눌러 시작하세요.</p></div>`;
    return;
  }
  let runMins=0;
  sessions.forEach((ses,si)=>{
    const badge=getSesBadge(ses);
    const missItems=PHASES.filter((_,pi)=>ses.checks?.[pi]==='missing').map(ph=>ph.name);
    const sm=sesMins(ses); runMins+=sm;
    const sk=ses._key;
    const card=document.createElement('div');
    card.className='ses-card'+(badge.hasMiss?' has-miss':'');
    const rows=PHASES.map((ph,pi)=>{
      const v=ses.checks?.[pi]||null;
      const chip=getChip(d.deadlines?.[pi],v==='done');
      const chipHtml=chip?`<span class="dl-chip ${chip.cls}">${chip.text}</span>`:'';
      const dlTxt=d.deadlines?.[pi]?`<span style="font-size:10px;color:var(--text3);margin-left:5px;">(~${fmtDate(d.deadlines[pi])})</span>`:'';
      return `<tr class="r${pi}">
        <td><div class="cat-cell"><div class="cat-ic">${ph.icon}</div>${ph.name}${dlTxt}${chipHtml}</div></td>
        <td class="check-td"><div class="tri">
          <button class="tri-b${v==='done'?' a-done':''}" data-type="ses" data-sk="${sk}" data-pi="${pi}" data-v="done">✓ 완료</button>
          <button class="tri-b${v==='missing'?' a-miss':''}" data-type="ses" data-sk="${sk}" data-pi="${pi}" data-v="missing">✕ 미기입</button>
          <button class="tri-b${v===null?' a-pend':''}" data-type="ses" data-sk="${sk}" data-pi="${pi}" data-v="null">— 미확인</button>
        </div></td>
      </tr>`;
    }).join('');
    card.innerHTML=`
      <div class="ses-head">
        <div class="ses-num">ROUND ${si+1}</div>
        <div class="ses-meta">
          <div class="ses-field">
            <span class="ses-field-l">📅 날짜</span>
            <input type="date" class="ses-date" value="${ses.date||''}" data-sk="${sk}">
          </div>
          <div class="ses-field">
            <span class="ses-field-l">⏱ 시간</span>
            <div class="time-input-wrap">
              <input type="number" class="time-num time-h" min="0" max="23" placeholder="0" value="${ses.duration?.h??''}" data-sk="${sk}">
              <span class="time-unit">시간</span>
              <input type="number" class="time-num time-m" min="0" max="59" placeholder="0" value="${ses.duration?.m??''}" data-sk="${sk}">
              <span class="time-unit">분</span>
            </div>
          </div>
          ${sm>0?`<span class="time-total-badge">${fmtMins(sm)}</span>`:''}
        </div>
        <div class="ses-head-r">
          <span class="ses-badge ${badge.cls}">${badge.label}</span>
          <button class="del-btn" data-sk="${sk}">✕</button>
        </div>
      </div>
      <table class="ses-table"><thead><tr><th>평가 영역 &amp; 마감일</th><th class="check-th">수행일지</th></tr></thead><tbody>${rows}</tbody></table>
      ${missItems.length?`<div class="miss-row">⚠️ 미기입 : ${missItems.join(' · ')}</div>`:''}
      <div class="time-summary-bar">⏱ ${si+1}회차까지 누적: <strong>${fmtMins(runMins)}</strong></div>
      <div class="notes-wrap"><div class="notes-lbl">메모</div><textarea class="notes-ta" placeholder="멘토링 내용, 미기입 사유 등..." data-sk="${sk}">${ses.notes||''}</textarea></div>
    `;
    wrap.appendChild(card);
  });

  wrap.querySelectorAll('.tri-b[data-type="ses"]').forEach(btn=>{
    btn.addEventListener('click',function(){
      const val=this.dataset.v==='null'?null:this.dataset.v;
      dbSet(`cohorts/${activeCohort}/mentoring/${activeMentor}/sessions/${this.dataset.sk}/checks/${this.dataset.pi}`,val);
      showToast(val==='missing'?'⚠️ 수행일지 미기입':val==='done'?'✓ 수행일지 완료':'— 미확인');
    });
  });
  wrap.querySelectorAll('input.ses-date').forEach(inp=>{
    inp.addEventListener('change',()=>dbSet(`cohorts/${activeCohort}/mentoring/${activeMentor}/sessions/${inp.dataset.sk}/date`,inp.value));
  });
  wrap.querySelectorAll('input.time-h').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const v=Math.max(0,parseInt(inp.value)||0); inp.value=v||'';
      dbSet(`cohorts/${activeCohort}/mentoring/${activeMentor}/sessions/${inp.dataset.sk}/duration/h`,v);
    });
  });
  wrap.querySelectorAll('input.time-m').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const v=Math.min(59,Math.max(0,parseInt(inp.value)||0)); inp.value=v||'';
      dbSet(`cohorts/${activeCohort}/mentoring/${activeMentor}/sessions/${inp.dataset.sk}/duration/m`,v);
    });
  });
  wrap.querySelectorAll('textarea.notes-ta').forEach(ta=>{
    let tmr;
    ta.addEventListener('input',()=>{ clearTimeout(tmr); tmr=setTimeout(()=>dbSet(`cohorts/${activeCohort}/mentoring/${activeMentor}/sessions/${ta.dataset.sk}/notes`,ta.value),800); });
  });
  wrap.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      if(confirm('이 회차를 삭제할까요?')){
        dbRemove(`cohorts/${activeCohort}/mentoring/${activeMentor}/sessions/${this.dataset.sk}`);
        showToast('회차 삭제됨');
      }
    });
  });
}

function addSession(){
  const r=push(ref(db,`cohorts/${activeCohort}/mentoring/${activeMentor}/sessions`));
  set(r,{date:'',duration:{h:0,m:0},checks:{},notes:''});
  showToast('새 회차 추가');
  setTimeout(()=>document.getElementById('sesWrap')?.lastElementChild?.scrollIntoView({behavior:'smooth',block:'start'}),400);
}

function render(){ renderCohortBar(); renderSidebar(); if(activeCohort) renderMain(); }

/* ── 기수 추가 모달 ── */
function buildMentorInputs(){
  const wrap=document.getElementById('mentorInputs');
  wrap.innerHTML='';
  for(let i=0;i<5;i++){
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';
    row.innerHTML=`<span style="font-size:12px;color:var(--text3);width:52px;flex-shrink:0;">멘토 ${i+1}</span>
      <input class="modal-input" style="margin-bottom:0;" placeholder="${DEFAULT_MENTORS[i]}" id="mInput${i}" value="${DEFAULT_MENTORS[i]}">`;
    wrap.appendChild(row);
  }
}

document.getElementById('addCohortBtn').addEventListener('click',()=>{
  document.getElementById('cohortNameInput').value=`${Object.keys(state).length+1}기`;
  buildMentorInputs();
  document.getElementById('cohortModal').classList.add('show');
});
document.getElementById('cohortModalCancel').addEventListener('click',()=>{
  document.getElementById('cohortModal').classList.remove('show');
});
document.getElementById('cohortModalConfirm').addEventListener('click',()=>{
  const cohortName=document.getElementById('cohortNameInput').value.trim()||`${Object.keys(state).length+1}기`;
  const mentorNames=Array.from({length:5},(_,i)=>document.getElementById(`mInput${i}`).value.trim()||DEFAULT_MENTORS[i]);
  createCohort(cohortName, mentorNames);
  document.getElementById('cohortModal').classList.remove('show');
  showToast(`"${cohortName}" 기수가 추가되었습니다`);
});
document.getElementById('cohortModal').addEventListener('click',function(e){ if(e.target===this) this.classList.remove('show'); });

/* ── 날짜 ── */
const d=new Date();
document.getElementById('hDate').textContent=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
</script>
</body>
</html>
