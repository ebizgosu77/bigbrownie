<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멘토링 체크일지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3ef;
    --surface: #ffffff;
    --surface2: #f9f8f5;
    --border: #e4e2db;
    --border2: #d0cec6;
    --text: #1a1916;
    --text2: #5a5850;
    --text3: #9a9890;
    --accent: #2a5c45;
    --accent-light: #e8f2ed;
    --accent2: #c8773a;
    --accent2-light: #fdf0e6;
    --danger: #c0392b;
    --danger-light: #fdf0ef;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--text);
    color: #f4f3ef;
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
  }

  .header-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }

  .header-title .dot { width: 7px; height: 7px; background: var(--accent2); border-radius: 50%; display: inline-block; }

  .header-legend {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #c0bdb6;
    white-space: nowrap;
  }

  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .legend-dot.done { background: #2a5c45; }
  .legend-dot.missing { background: #c0392b; }
  .legend-dot.pending { background: #6b6960; }

  .header-meta { font-size: 12px; color: #9a9890; font-family: 'DM Mono', monospace; white-space: nowrap; }

  .app { display: flex; flex: 1; height: calc(100vh - 56px); }

  .sidebar {
    width: 230px;
    min-width: 230px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
  .sidebar-count { font-size: 13px; color: var(--text2); }
  .mentor-list { padding: 10px 0; flex: 1; }

  .mentor-item {
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }

  .mentor-item:hover { background: var(--surface2); }
  .mentor-item.active { background: var(--accent-light); border-left-color: var(--accent); }
  .mentor-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .mentor-item.active .mentor-name { color: var(--accent); }

  .mentor-status-row { display: flex; gap: 4px; flex-wrap: wrap; }

  .status-pill {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 500;
  }

  .status-pill.done { background: var(--accent-light); color: var(--accent); }
  .status-pill.missing { background: var(--danger-light); color: var(--danger); }
  .status-pill.pending { background: var(--border); color: var(--text3); }

  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
  .total-summary { font-size: 12px; color: var(--text2); line-height: 1.8; }

  .main { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; }

  .mentor-header-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
    flex-wrap: wrap;
    gap: 16px;
  }

  .mentor-title-group h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .mentor-title-group p { font-size: 13px; color: var(--text2); }

  .mentor-stats { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .stat-box {
    text-align: center;
    padding: 10px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-width: 68px;
  }

  .stat-num { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .stat-num.green { color: var(--accent); }
  .stat-num.red { color: var(--danger); }
  .stat-num.gray { color: var(--text3); }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .add-session-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 2px 6px rgba(42,92,69,0.25);
    white-space: nowrap;
  }

  .add-session-btn:hover { background: #1e4433; transform: translateY(-1px); }

  .sessions-container { display: flex; flex-direction: column; gap: 16px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 12px;
  }
  .empty-state p { font-size: 14px; margin-top: 12px; }

  .session-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .session-card:hover { box-shadow: var(--shadow-lg); }
  .session-card.has-missing { border-color: #f5c6c6; }

  .session-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }

  .session-card.has-missing .session-card-header { background: #fff8f8; border-bottom-color: #f5c6c6; }

  .session-num-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: white;
    background: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }

  .session-date-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 180px; }
  .session-date-label { font-size: 12px; color: var(--text3); }

  .session-date-input {
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    background: var(--surface);
    cursor: pointer;
    transition: border 0.15s;
  }

  .session-date-input:focus { outline: none; border-color: var(--accent); }

  .session-header-right { display: flex; align-items: center; gap: 10px; }

  .session-badge {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    white-space: nowrap;
  }

  .session-badge.all-done { background: var(--accent-light); color: var(--accent); }
  .session-badge.has-missing { background: var(--danger-light); color: var(--danger); }
  .session-badge.partial { background: var(--accent2-light); color: var(--accent2); }
  .session-badge.empty { background: var(--border); color: var(--text3); }

  .delete-session-btn {
    width: 26px; height: 26px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-size: 13px;
    flex-shrink: 0;
  }

  .delete-session-btn:hover { background: #fef0f0; border-color: #f5c6c6; color: var(--danger); }

  .checklist-table { width: 100%; border-collapse: collapse; }
  .checklist-table thead tr { border-bottom: 1px solid var(--border); }

  .checklist-table th {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 10px 22px;
    text-align: left;
  }

  .checklist-table th:not(:first-child) { text-align: center; }

  .checklist-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .checklist-table tbody tr:last-child { border-bottom: none; }
  .checklist-table tbody tr:hover { background: var(--surface2); }

  .category-cell {
    padding: 14px 22px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }

  .category-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  .cat-0 .category-icon { background: #e8f0fe; }
  .cat-1 .category-icon { background: #e8f5e9; }
  .cat-2 .category-icon { background: #fff3e0; }
  .cat-3 .category-icon { background: #fce4ec; }

  .check-cell { text-align: center; padding: 12px 16px; }

  /* ── 3-STATE TOGGLE ── */
  .tri-toggle {
    display: inline-flex;
    border: 1px solid var(--border2);
    border-radius: 8px;
    overflow: hidden;
  }

  .tri-btn {
    padding: 6px 11px;
    cursor: pointer;
    border: none;
    background: var(--surface);
    color: var(--text3);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    border-right: 1px solid var(--border2);
    white-space: nowrap;
    line-height: 1;
  }

  .tri-btn:last-child { border-right: none; }
  .tri-btn:hover:not(.active-done):not(.active-missing):not(.active-pending) { background: var(--surface2); }

  .tri-btn.active-done { background: var(--accent); color: white; font-weight: 700; }
  .tri-btn.active-missing { background: var(--danger); color: white; font-weight: 700; }
  .tri-btn.active-pending { background: #e0dfd9; color: var(--text2); font-weight: 700; }

  .missing-alert-row {
    padding: 8px 22px;
    background: #fff2f2;
    border-top: 1px solid #f5c6c6;
    font-size: 12px;
    color: var(--danger);
    display: flex;
    align-items: flex-start;
    gap: 6px;
    line-height: 1.6;
    flex-wrap: wrap;
  }

  .session-notes-wrap {
    padding: 12px 22px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }

  .notes-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }

  .session-notes {
    width: 100%;
    border: 1px solid var(--border2);
    border-radius: 7px;
    padding: 9px 12px;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    background: var(--surface);
    resize: vertical;
    min-height: 44px;
    transition: border 0.15s;
  }

  .session-notes:focus { outline: none; border-color: var(--accent); }
  .session-notes::placeholder { color: var(--text3); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--text);
    color: #f4f3ef;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    transform: translateY(10px);
    opacity: 0;
    transition: all 0.2s;
    z-index: 1000;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <span class="dot"></span>
    멘토링 체크일지
  </div>
  <div class="header-legend">
    <div class="legend-item"><span class="legend-dot done"></span>제출완료</div>
    <div class="legend-item"><span class="legend-dot missing"></span>미기입</div>
    <div class="legend-item"><span class="legend-dot pending"></span>미확인</div>
  </div>
  <div class="header-meta" id="headerDate"></div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-label">멘토 목록</div>
      <div class="sidebar-count">5명</div>
    </div>
    <div class="mentor-list" id="mentorList"></div>
    <div class="sidebar-footer">
      <div class="total-summary" id="totalSummary"></div>
    </div>
  </aside>
  <main class="main" id="mainContent"></main>
</div>

<div class="toast" id="toast"></div>

<script>
const MENTORS = ['홍건의', '양지현', '석지민', '양재연', '이용준'];
const CATEGORIES = [
  { name: '프로젝트 기획평가', icon: '📋' },
  { name: '백엔드 평가', icon: '⚙️' },
  { name: '프론트엔드 평가', icon: '🖥️' },
  { name: '시스템 통합평가', icon: '🔗' },
];
const CHECKS = ['수행일지', '산출물평가서'];
// val: null=미확인, 'done'=제출완료, 'missing'=미기입
const STORAGE_KEY = 'mentoring_check_v3';

let state = loadState();
let activeMentor = 0;

function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  const s = {}; MENTORS.forEach((_, i) => { s[i] = []; }); return s;
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function calcStats(mi) {
  const sessions = state[mi] || [];
  let done = 0, missing = 0, pending = 0, total = 0;
  sessions.forEach(s => {
    CATEGORIES.forEach((_, ci) => CHECKS.forEach((_, ki) => {
      total++;
      const v = s.checks?.[ci]?.[ki];
      if (v === 'done') done++;
      else if (v === 'missing') missing++;
      else pending++;
    }));
  });
  return { done, missing, pending, total, sessions: sessions.length };
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function renderSidebar() {
  const list = document.getElementById('mentorList');
  list.innerHTML = '';
  let tDone = 0, tMissing = 0, tSessions = 0;

  MENTORS.forEach((name, i) => {
    const st = calcStats(i);
    tDone += st.done; tMissing += st.missing; tSessions += st.sessions;

    const item = document.createElement('div');
    item.className = 'mentor-item' + (i === activeMentor ? ' active' : '');

    const pills = st.sessions === 0
      ? `<span class="status-pill pending">세션 없음</span>`
      : [
          st.done   > 0 ? `<span class="status-pill done">완료 ${st.done}</span>` : '',
          st.missing > 0 ? `<span class="status-pill missing">미기입 ${st.missing}</span>` : '',
          st.pending > 0 ? `<span class="status-pill pending">미확인 ${st.pending}</span>` : '',
        ].join('');

    item.innerHTML = `
      <div class="mentor-name">${name} 멘토</div>
      <div class="mentor-status-row">${pills}</div>
    `;
    item.onclick = () => { activeMentor = i; render(); };
    list.appendChild(item);
  });

  document.getElementById('totalSummary').innerHTML =
    `전체 세션: <strong>${tSessions}회</strong><br>` +
    `제출완료: <strong style="color:var(--accent)">${tDone}</strong> &nbsp;·&nbsp; ` +
    `미기입: <strong style="color:var(--danger)">${tMissing}</strong>`;
}

function renderMain() {
  const main = document.getElementById('mainContent');
  const st = calcStats(activeMentor);

  main.innerHTML = `
    <div class="mentor-header-card">
      <div class="mentor-title-group">
        <h2>${MENTORS[activeMentor]} 멘토</h2>
        <p>멘토링 회차별 수행일지 및 산출물평가서 제출 현황</p>
      </div>
      <div class="mentor-stats">
        <div class="stat-box"><div class="stat-num gray">${st.sessions}</div><div class="stat-label">총 회차</div></div>
        <div class="stat-box"><div class="stat-num green">${st.done}</div><div class="stat-label">제출완료</div></div>
        <div class="stat-box"><div class="stat-num red">${st.missing}</div><div class="stat-label">미기입</div></div>
        <div class="stat-box"><div class="stat-num gray">${st.pending}</div><div class="stat-label">미확인</div></div>
        <button class="add-session-btn" id="addSessionBtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
          회차 추가
        </button>
      </div>
    </div>
    <div class="sessions-container" id="sessionsContainer"></div>
  `;

  document.getElementById('addSessionBtn').onclick = addSession;
  renderSessions();
}

function getSessionMeta(session) {
  let done = 0, missing = 0, total = CATEGORIES.length * CHECKS.length;
  CATEGORIES.forEach((_, ci) => CHECKS.forEach((_, ki) => {
    const v = session.checks?.[ci]?.[ki];
    if (v === 'done') done++;
    else if (v === 'missing') missing++;
  }));
  const pending = total - done - missing;
  const hasMissing = missing > 0;
  let label, badgeCls;
  if (done === total) { label = '전체완료'; badgeCls = 'all-done'; }
  else if (hasMissing && pending === 0 && done === 0) { label = `미기입 ${missing}건`; badgeCls = 'has-missing'; }
  else if (hasMissing) { label = `미기입 ${missing}건`; badgeCls = 'has-missing'; }
  else if (done > 0) { label = `${done}/${total} 완료`; badgeCls = 'partial'; }
  else { label = '미확인'; badgeCls = 'empty'; }
  return { hasMissing, label, badgeCls };
}

function getMissingItems(session) {
  const items = [];
  CATEGORIES.forEach((cat, ci) => CHECKS.forEach((chk, ki) => {
    if (session.checks?.[ci]?.[ki] === 'missing') items.push(`${cat.name} · ${chk}`);
  }));
  return items;
}

function renderSessions() {
  const container = document.getElementById('sessionsContainer');
  if (!container) return;
  const sessions = state[activeMentor] || [];
  container.innerHTML = '';

  if (!sessions.length) {
    container.innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="8" y="6" width="24" height="28" rx="3" stroke="#9a9890" stroke-width="1.5"/><path d="M14 14h12M14 20h8" stroke="#9a9890" stroke-width="1.5" stroke-linecap="round"/></svg>
        <p>아직 멘토링 회차가 없습니다.<br><strong>회차 추가</strong> 버튼을 눌러 시작하세요.</p>
      </div>`;
    return;
  }

  sessions.forEach((session, si) => {
    const meta = getSessionMeta(session);
    const missingItems = getMissingItems(session);

    const card = document.createElement('div');
    card.className = `session-card${meta.hasMissing ? ' has-missing' : ''}`;

    const rows = CATEGORIES.map((cat, ci) => `
      <tr class="cat-${ci}">
        <td><div class="category-cell"><div class="category-icon">${cat.icon}</div>${cat.name}</div></td>
        ${CHECKS.map((_, ki) => {
          const v = session.checks?.[ci]?.[ki] || null;
          return `<td class="check-cell">
            <div class="tri-toggle">
              <button class="tri-btn${v === 'done' ? ' active-done' : ''}"
                data-m="${activeMentor}" data-s="${si}" data-c="${ci}" data-k="${ki}" data-v="done">✓ 완료</button>
              <button class="tri-btn${v === 'missing' ? ' active-missing' : ''}"
                data-m="${activeMentor}" data-s="${si}" data-c="${ci}" data-k="${ki}" data-v="missing">✕ 미기입</button>
              <button class="tri-btn${v === null ? ' active-pending' : ''}"
                data-m="${activeMentor}" data-s="${si}" data-c="${ci}" data-k="${ki}" data-v="null">— 미확인</button>
            </div>
          </td>`;
        }).join('')}
      </tr>`).join('');

    const alertHtml = missingItems.length
      ? `<div class="missing-alert-row">⚠️ 미기입 항목 : ${missingItems.join('  /  ')}</div>` : '';

    card.innerHTML = `
      <div class="session-card-header">
        <div class="session-num-badge">ROUND ${si + 1}</div>
        <div class="session-date-wrap">
          <span class="session-date-label">날짜</span>
          <input type="date" class="session-date-input" value="${session.date || ''}"
            data-m="${activeMentor}" data-s="${si}">
        </div>
        <div class="session-header-right">
          <span class="session-badge ${meta.badgeCls}">${meta.label}</span>
          <button class="delete-session-btn" data-m="${activeMentor}" data-s="${si}">✕</button>
        </div>
      </div>
      <table class="checklist-table">
        <thead><tr>
          <th>평가 영역</th>
          ${CHECKS.map(c => `<th>${c}</th>`).join('')}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${alertHtml}
      <div class="session-notes-wrap">
        <div class="notes-label">메모</div>
        <textarea class="session-notes" placeholder="멘토링 내용, 미기입 사유 등 메모..."
          data-m="${activeMentor}" data-s="${si}">${session.notes || ''}</textarea>
      </div>
    `;
    container.appendChild(card);
  });

  container.querySelectorAll('.tri-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const m = +this.dataset.m, s = +this.dataset.s, c = +this.dataset.c, k = +this.dataset.k;
      const val = this.dataset.v === 'null' ? null : this.dataset.v;
      if (!state[m][s].checks) state[m][s].checks = {};
      if (!state[m][s].checks[c]) state[m][s].checks[c] = {};
      state[m][s].checks[c][k] = val;
      saveState();
      if (val === 'missing') showToast('⚠️ 미기입으로 표시되었습니다');
      else if (val === 'done') showToast('✓ 제출완료로 표시되었습니다');
      else showToast('— 미확인으로 변경되었습니다');
      render();
    });
  });

  container.querySelectorAll('input[type="date"]').forEach(inp => {
    inp.addEventListener('change', function() {
      state[+this.dataset.m][+this.dataset.s].date = this.value;
      saveState();
    });
  });

  container.querySelectorAll('textarea.session-notes').forEach(ta => {
    ta.addEventListener('input', function() {
      state[+this.dataset.m][+this.dataset.s].notes = this.value;
      saveState();
    });
  });

  container.querySelectorAll('.delete-session-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const m = +this.dataset.m, s = +this.dataset.s;
      if (confirm(`${MENTORS[m]} 멘토 ${s + 1}회차를 삭제할까요?`)) {
        state[m].splice(s, 1);
        saveState();
        showToast('회차가 삭제되었습니다.');
        render();
      }
    });
  });
}

function addSession() {
  if (!state[activeMentor]) state[activeMentor] = [];
  state[activeMentor].push({ date: '', checks: {}, notes: '' });
  saveState();
  showToast(`${MENTORS[activeMentor]} 멘토 ${state[activeMentor].length}회차 추가`);
  render();
  setTimeout(() => {
    document.getElementById('sessionsContainer')?.lastElementChild
      ?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function render() { renderSidebar(); renderMain(); }

const d = new Date();
document.getElementById('headerDate').textContent =
  `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;

render();
</script>
</body>
</html>
